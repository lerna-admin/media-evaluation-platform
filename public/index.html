<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Media Evaluation Platform</title>
    <link rel="stylesheet" href="/public/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand-mark">MEP</div>
        <nav class="content-tabs" aria-label="Content type">
          <button class="tab active" data-type-tab="all">Home</button>
          <button class="tab" data-type-tab="movie">Movies</button>
          <button class="tab" data-type-tab="series">Series</button>
        </nav>
      </header>

      <section class="toolbar">
        <details class="imports">
          <summary>Catalog tools</summary>
          <label>
            Pages
            <input id="pages" type="number" min="1" max="10" value="1" />
          </label>
          <button data-import="latest-movies">Import Movies</button>
          <button data-import="latest-tvshows">Import Series</button>
        </details>
        <div class="filters">
          <input id="search" type="search" placeholder="Buscar título..." />
          <select id="typeFilter" aria-label="Content type">
            <option value="all">All</option>
            <option value="movie">Movies</option>
            <option value="series">Series</option>
          </select>
        </div>
      </section>

      <section class="layout">
        <aside class="catalog">
          <div class="catalog-header">
            <h2>Catalog</h2>
            <span id="count">0 items</span>
          </div>
          <div id="items" class="items"></div>
        </aside>

        <section class="detail" id="detail">
          <div class="empty">Import or select a title to preview the embed.</div>
        </section>
      </section>
    </main>

    <script type="module" src="/public/app.js"></script>
  </body>
</html>
